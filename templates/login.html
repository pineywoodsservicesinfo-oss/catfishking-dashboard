<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catfish King - Store Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .login-bg {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .fish-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 10c-8 0-15 8-15 20s7 20 15 20 15-8 15-20-7-20-15-20zm0 5c5 0 10 6 10 15s-5 15-10 15-10-6-10-15 5-15 10-15' fill='%23ffffff' fill-opacity='0.03'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="login-bg fish-pattern min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-yellow-500 rounded-full mb-4">
                <svg class="w-12 h-12 text-yellow-900" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.85 0 3.58-.5 5.07-1.37l-1.42-1.42C14.52 19.63 13.28 20 12 20c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8c0 .68-.09 1.35-.24 2l1.62 1.62C21.78 14.45 22 13.25 22 12c0-5.52-4.48-10-10-10zm3 15l-5-5 1.41-1.41L15 14.17l4.59-4.58L21 11l-6 6z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Catfish King</h1>
            <p class="text-gray-400">Great American Foods</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-8 border border-white/20">
            <h2 class="text-xl font-semibold text-white mb-6 text-center">Sign In</h2>

            {% if error %}
            <div class="bg-red-500/20 border border-red-500/50 text-red-200 rounded-lg p-3 mb-4 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-300 mb-2">Email</label>
                    <input type="email" name="email" required
                           class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-500 transition-colors"
                           placeholder="you@catfishking.com">
                </div>
                <div>
                    <label class="block text-sm text-gray-300 mb-2">Password</label>
                    <input type="password" name="password" required
                           class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-500 transition-colors"
                           placeholder="Enter password">
                </div>
                <button type="submit"
                        class="w-full bg-yellow-500 hover:bg-yellow-400 text-yellow-900 font-semibold py-3 rounded-lg transition-colors">
                    Sign In
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-white/10">
                <p class="text-xs text-gray-400 text-center mb-3">Demo Accounts</p>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div class="bg-white/5 rounded-lg p-3">
                        <p class="text-yellow-500 font-medium">Corporate</p>
                        <p class="text-gray-400">corporate@catfishking.com</p>
                    </div>
                    <div class="bg-white/5 rounded-lg p-3">
                        <p class="text-yellow-500 font-medium">Store Manager</p>
                        <p class="text-gray-400">store1@catfishking.com</p>
                    </div>
                </div>
                <p class="text-xs text-gray-500 text-center mt-2">Password: demo1234</p>
            </div>
        </div>

        <p class="text-center text-gray-500 text-xs mt-6">
            © 2026 Great American Foods. All rights reserved.
        </p>
    </div>
</body>
</html>
