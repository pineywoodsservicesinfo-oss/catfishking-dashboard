<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
    </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center">
    <div class="text-center">
        <div class="w-20 h-20 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="text-yellow-900 font-bold text-2xl">CK</span>
        </div>
        <h1 class="text-4xl font-bold mb-4">404 - Not Found</h1>
        <p class="text-gray-400 mb-2">{{ message }}</p>
        <p class="text-gray-500 text-sm mb-6">The resource you're looking for doesn't exist or has been moved.</p>
        <a href="/corporate" class="inline-block bg-yellow-500 hover:bg-yellow-400 text-yellow-900 font-bold px-6 py-3 rounded-lg transition-colors">
            Return to Dashboard
        </a>
    </div>
</body>
</html>
